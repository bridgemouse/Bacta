services:
  bacta-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./insights:/app/insights
      - ./mx4:/app/mx4
      - /mnt/vault:/mnt/vault:ro
    restart: unless-stopped
    depends_on:
      - garmin-poller

  garmin-poller:
    build:
      context: poller
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DB_PATH=/data/bacta.db
      - POLL_SIGNAL_PATH=/data/poll_signal
    volumes:
      - ./data:/data
    restart: unless-stopped
