<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bacta · Prototype v3 — Full Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400..800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #07090e; }
  #root {
    width: 100%; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .bacta-screen ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes mx4spin      { to { transform: rotate(360deg); } }
  @keyframes mx4breathe   { 0%,100% { transform: scale(0.82); opacity: 0.75; }
                             50%     { transform: scale(1);    opacity: 1;    } }
  @keyframes mx4ping      { 0%        { transform: scale(1);   opacity: 0.55; }
                             80%,100% { transform: scale(2.4); opacity: 0;    } }
  @keyframes mx4tele      { 0%,100% { transform: scaleY(0.35); }
                             50%     { transform: scaleY(1);   } }
  @keyframes mx4blink     { 0%,50%       { opacity: 1; }
                             50.01%,100% { opacity: 0; } }
  @keyframes mx4glowbreathe {
    0%,100% { box-shadow: 0 0 5px  rgba(43,196,232,0.12); }
    50%     { box-shadow: 0 0 15px rgba(43,196,232,0.34); }
  }
  @keyframes mx4shimmer {
    0%   { background-position:  200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
  integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
  integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
  integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
  crossorigin="anonymous"></script>

<!-- ── Base infrastructure (unchanged from v2) ───────────────────────── -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="bacta-core.jsx"></script>
<script type="text/babel" src="bacta-data.jsx"></script>
<script type="text/babel" src="bacta-final.jsx"></script>
<script type="text/babel" src="bacta-viz.jsx"></script>
<script type="text/babel" src="bacta-viz-v2.jsx"></script>
<script type="text/babel" src="bacta-data-v2.jsx"></script>

<!-- ── Section base views ─────────────────────────────────────────────── -->
<script type="text/babel" src="bacta-recovery.jsx"></script>
<script type="text/babel" src="bacta-sleep.jsx"></script>
<script type="text/babel" src="bacta-training.jsx"></script>
<script type="text/babel" src="bacta-home.jsx"></script>
<script type="text/babel" src="bacta-navsheet.jsx"></script>
<script type="text/babel" src="bacta-app.jsx"></script>

<!-- ── v3 layer: data → viz → sections → app ─────────────────────────── -->
<script type="text/babel" src="bacta-v3-infocard.jsx"></script>
<script type="text/babel" src="bacta-v3-data.jsx"></script>
<script type="text/babel" src="bacta-v3-viz.jsx"></script>
<script type="text/babel" src="bacta-v3-recovery.jsx"></script>
<script type="text/babel" src="bacta-v3-sleep.jsx"></script>
<script type="text/babel" src="bacta-v3-training.jsx"></script>
<script type="text/babel" src="bacta-v3-dailylog.jsx"></script>
<script type="text/babel" src="bacta-v3-bloodwork.jsx"></script>
<script type="text/babel" src="bacta-v3-app.jsx"></script>

<script type="text/babel">
function Prototype() {
  return (
    <div className="bacta-screen">
      <IOSDevice dark width={390} height={844}>
        <BactaApp />
      </IOSDevice>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Prototype />);
</script>
</body>
</html>
