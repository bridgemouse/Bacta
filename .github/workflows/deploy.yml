name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to LXC 109
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: git -C /opt/bacta fetch origin main && git -C /opt/bacta reset --hard origin/main

      - name: Install dependencies
        run: npm --prefix /opt/bacta ci

      - name: Build
        run: npm --prefix /opt/bacta run build

      - name: Restart service
        run: sudo systemctl restart bacta-api

      - name: Health check
        run: sleep 3 && curl -sf http://localhost:3001/api/health
