<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bacta · Sleep Stage Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400..800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #07090e; }
  #root { min-height: 100vh; padding: 30px 18px 60px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
  @keyframes mx4spin { to { transform: rotate(360deg); } }
  @keyframes mx4breathe { 0%,100% { transform: scale(0.82); opacity: 0.75; } 50% { transform: scale(1); opacity: 1; } }
  @keyframes mx4ping { 0% { transform: scale(1); opacity: 0.55; } 80%,100% { transform: scale(2.4); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="bacta-core.jsx"></script>
<script type="text/babel" src="bacta-data.jsx"></script>
<script type="text/babel" src="bacta-final.jsx"></script>
<script type="text/babel" src="bacta-viz.jsx"></script>

<script type="text/babel">
const M = "'JetBrains Mono', ui-monospace, monospace";
const ACC = BACTA.section.sleep.accent;       // violet channel
const STAGE_COL = { 0: '#56657a', 1: '#c4b5fd', 2: '#a78bfa', 3: '#7c5cff' }; // awake/rem/light/deep
const m = BACTA.metrics.sleep;
const total = m.stages.reduce((a, s) => a + s.mins, 0);

/* shared card shell, matches the in-app instrument card */
function OptCard({ n, name, blurb, children }) {
  const c = BACTA.color;
  return (
    <div style={{ width: 366, background: c.surface, border: `1px solid ${c.line}`, borderRadius: 13, padding: '15px 16px 16px', position: 'relative', overflow: 'hidden', fontFamily: BACTA.FONT_UI }}>
      <Bracket color={ACC} inset={7} op={0.32} />
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 3 }}>
        <span style={{ fontFamily: M, fontSize: 9, color: ACC, fontWeight: 700, letterSpacing: '0.14em' }}>OPT {String(n).padStart(2,'0')}</span>
        <span style={{ fontFamily: M, fontSize: 10.5, color: c.text, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase' }}>{name}</span>
      </div>
      <div style={{ fontFamily: M, fontSize: 9.5, color: c.text3, marginBottom: 14, letterSpacing: '0.02em' }}>{blurb}</div>
      {children}
    </div>
  );
}

/* compact stage legend (durations + %) */
function Legend() {
  const c = BACTA.color;
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '7px 14px', marginTop: 13 }}>
      {m.stages.map(s => (
        <span key={s.key} style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 9, height: 9, borderRadius: 2, background: s.color, opacity: s.key === 'awake' ? 0.5 : 1 }} />
          <span style={{ fontFamily: M, fontSize: 9.5, color: c.text2 }}>{s.label}</span>
          <span style={{ fontFamily: M, fontSize: 9.5, color: c.text, fontWeight: 600 }}>{Math.floor(s.mins/60)}h {String(s.mins%60).padStart(2,'0')}m</span>
          {s.key !== 'awake' && <span style={{ fontFamily: M, fontSize: 8.5, color: c.text3 }}>{s.pct}%</span>}
        </span>
      ))}
    </div>
  );
}

const timeAxis = (
  <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 7 }}>
    {['11:42p','02:00','04:00','06:31a'].map(t => <span key={t} style={{ fontFamily: M, fontSize: 8, color: BACTA.color.text3 }}>{t}</span>)}
  </div>
);

/* ── OPT 1 — current stepped hypnogram (reference) ── */
function OptHypno() {
  return <><Hypnogram data={m.hypno} stages={m.stages} /><Legend /></>;
}

/* ── OPT 2 — depth area: filled topographic "how deep" chart ── */
function OptDepth() {
  const w = 334, h = 88, padT = 6, padB = 4;
  const n = m.hypno.length, iw = w, ih = h - padT - padB;
  const x = (i) => (i / n) * iw;
  const y = (lv) => padT + (lv / 3) * ih;        // deeper = lower
  let line = '';
  m.hypno.forEach((lv, i) => { const yy = y(lv); line += (i===0?`M0 ${yy}`:`L${x(i)} ${yy}`) + ` L${x(i+1)} ${yy}`; });
  const area = `${line} L${w} ${h} L0 ${h} Z`;
  const id = 'dep';
  return (
    <>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
        <defs>
          <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stopColor={ACC} stopOpacity="0.05" />
            <stop offset="1" stopColor="#7c5cff" stopOpacity="0.42" />
          </linearGradient>
        </defs>
        {[0,1,2,3].map(lv => <line key={lv} x1="0" y1={y(lv)} x2={w} y2={y(lv)} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />)}
        <path d={area} fill={`url(#${id})`} />
        <path d={line} fill="none" stroke={ACC} strokeWidth="1.8" strokeLinejoin="round" style={{ filter: `drop-shadow(0 0 4px ${hexA(ACC,0.5)})` }} />
      </svg>
      {timeAxis}
      <Legend />
    </>
  );
}

/* ── OPT 3 — stage ribbon: the night as a continuous colored timeline ── */
function OptRibbon() {
  return (
    <>
      <div style={{ display: 'flex', height: 38, gap: 1, borderRadius: 7, overflow: 'hidden', border: `1px solid ${BACTA.color.line}` }}>
        {m.hypno.map((lv, i) => (
          <div key={i} style={{ flex: 1, background: STAGE_COL[lv], opacity: lv === 0 ? 0.45 : 0.92 }} title={['Awake','REM','Light','Deep'][lv]} />
        ))}
      </div>
      {timeAxis}
      <Legend />
    </>
  );
}

/* ── OPT 4 — proportional split bar (clean Garmin-style) ── */
function OptSplit() {
  const c = BACTA.color;
  return (
    <>
      <div style={{ display: 'flex', width: '100%', height: 22, borderRadius: 6, overflow: 'hidden', gap: 2 }}>
        {m.stages.map(s => (
          <div key={s.key} style={{ width: `${(s.mins/total)*100}%`, background: s.color, opacity: s.key==='awake'?0.45:1, borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            {s.pct >= 18 && <span style={{ fontFamily: M, fontSize: 9, fontWeight: 700, color: '#0b0d12' }}>{s.pct}%</span>}
          </div>
        ))}
      </div>
      <Legend />
    </>
  );
}

/* ── OPT 5 — stacked depth column + cycle dots ── */
function OptColumn() {
  const c = BACTA.color;
  const order = ['rem','light','deep'].map(k => m.stages.find(s => s.key === k)); // top→bottom
  const asleep = order.reduce((a,s)=>a+s.mins,0);
  return (
    <div style={{ display: 'flex', gap: 16, alignItems: 'stretch' }}>
      <div style={{ width: 46, display: 'flex', flexDirection: 'column', height: 132, borderRadius: 7, overflow: 'hidden', border: `1px solid ${c.line}` }}>
        {order.map(s => (
          <div key={s.key} style={{ height: `${(s.mins/asleep)*100}%`, background: s.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontFamily: M, fontSize: 8.5, fontWeight: 700, color: '#0b0d12' }}>{s.pct}</span>
          </div>
        ))}
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 9 }}>
        {m.stages.map(s => (
          <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ width: 9, height: 9, borderRadius: 2, background: s.color, opacity: s.key==='awake'?0.5:1 }} />
            <span style={{ fontFamily: M, fontSize: 10, color: c.text2, minWidth: 44 }}>{s.label}</span>
            <span style={{ fontFamily: M, fontSize: 12, color: c.text, fontWeight: 700 }}>{Math.floor(s.mins/60)}h {String(s.mins%60).padStart(2,'0')}m</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Page() {
  const c = BACTA.color;
  return (
    <>
      <div style={{ width: 366, display: 'flex', alignItems: 'center', gap: 10 }}>
        <MX4Sigil color={BACTA.mx4Color} size={22} spin glow mood="think" />
        <div>
          <div style={{ fontFamily: M, fontSize: 12, color: c.text, fontWeight: 700, letterSpacing: '0.1em' }}>SLEEP STAGE — OPTIONS</div>
          <div style={{ fontFamily: M, fontSize: 9, color: c.text3, letterSpacing: '0.06em', marginTop: 2 }}>SAME NIGHT · 5 TREATMENTS · PICK ONE</div>
        </div>
      </div>
      <OptCard n={1} name="Hypnogram" blurb="Current — stepped line across the night.">
        <OptHypno />
      </OptCard>
      <OptCard n={2} name="Depth Field" blurb="Filled topographic chart — reads as how deep, not just which stage.">
        <OptDepth />
      </OptCard>
      <OptCard n={3} name="Stage Ribbon" blurb="The night as one continuous colored band — sequence at a glance.">
        <OptRibbon />
      </OptCard>
      <OptCard n={4} name="Split Bar" blurb="Proportional breakdown — clean, no time axis.">
        <OptSplit />
      </OptCard>
      <OptCard n={5} name="Depth Column" blurb="Vertical stack by depth + readout column.">
        <OptColumn />
      </OptCard>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
