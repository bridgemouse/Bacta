<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bacta · Home Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400..800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #faf8f5; }
  #root { width: 100%; min-height: 100vh; }
  @keyframes mx4spin { to { transform: rotate(360deg); } }
  @keyframes mx4breathe { 0%,100% { transform: scale(0.82); opacity: 0.75; } 50% { transform: scale(1); opacity: 1; } }
  @keyframes mx4ping { 0% { transform: scale(1); opacity: 0.55; } 80%,100% { transform: scale(2.4); opacity: 0; } }
  @keyframes mx4scan { to { background-position: 0 -8px; } }
  @keyframes mx4tele { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
  @keyframes mx4blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
  @keyframes mx4pulse { 0% { transform: scale(1); opacity: 0.55; } 70%,100% { transform: scale(1.85); opacity: 0; } }
  @keyframes mx4glowbreathe { 0%,100% { box-shadow: 0 0 5px rgba(43,196,232,0.12); } 50% { box-shadow: 0 0 15px rgba(43,196,232,0.34); } }
  /* Hide native scrollbars inside phone screens for a clean capture */
  .bacta-screen ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="bacta-core.jsx"></script>
<script type="text/babel" src="bacta-vitals.jsx"></script>
<script type="text/babel" src="bacta-console.jsx"></script>
<script type="text/babel" src="bacta-mx4os.jsx"></script>
<script type="text/babel" src="bacta-mx4os-refined.jsx"></script>
<script type="text/babel" src="bacta-final.jsx"></script>
<script type="text/babel" src="bacta-colors.jsx"></script>

<script type="text/babel">
const MX4_MOODS = [
  ['transmit', 'Transmitting', 'speaking / briefing'],
  ['idle', 'Idle', 'at rest / ambient'],
  ['listen', 'Listening', 'ready for input'],
  ['think', 'Thinking', 'processing'],
  ['alert', 'Alert', 'caution / flag'],
  ['pleased', 'Pleased', 'positive read'],
];
function MoodSheet() {
  return (
    <div style={{ width: 446, background: '#0f1117', borderRadius: 16, padding: 22, fontFamily: "'Hanken Grotesk',sans-serif", border: '1px solid #1e2d3d' }}>
      <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, letterSpacing: '0.2em', color: '#56657a', marginBottom: 16 }}>MX-4 · EXPRESSION SET</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14 }}>
        {MX4_MOODS.map(([m, label, desc]) => (
          <div key={m} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, background: '#111827', border: '1px solid #1e2d3d', borderRadius: 12, padding: '16px 8px 12px' }}>
            <MX4Sigil color="#4ade80" size={42} spin glow mood={m} />
            <div style={{ fontSize: 12.5, fontWeight: 650, color: '#f4f7fb' }}>{label}</div>
            <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 8, letterSpacing: '0.05em', color: '#56657a', textAlign: 'center' }}>{desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Frame({ children }) {
  // Bacta home fills the device; dark status bar (white glyphs)
  return (
    <div className="bacta-screen" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
      <IOSDevice dark width={390} height={844}>{children}</IOSDevice>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="final" title="Bacta · Home — FINAL" subtitle="C as the base, B's System Cards, C's monospace numerals. Its two parents (C, B) sit alongside for reference.">
        <DCArtboard id="final" label="★ FINAL — MX-4 OS · System Cards" width={430} height={902}>
          <Frame><FinalScreen /></Frame>
        </DCArtboard>
        <DCArtboard id="mx4os" label="C · MX-4 OS — base (chrome + transmission panel)" width={430} height={902}>
          <Frame><MX4OSScreen /></Frame>
        </DCArtboard>
        <DCArtboard id="console" label="B · Field Console — donor of the System Cards" width={430} height={902}>
          <Frame><ConsoleScreen /></Frame>
        </DCArtboard>
      </DCSection>
      <DCSection id="expressions" title="MX-4 · Expression Set" subtitle="One aperture, many moods — so he never shows the same face twice on a screen. On Home: idle (status bar) · transmit (panel) · listen (dock).">
        <DCArtboard id="moods" label="Expression set — 6 states" width={470} height={420}>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%', padding: 12 }}>
            <MoodSheet />
          </div>
        </DCArtboard>
      </DCSection>
      <DCSection id="colors" title="MX-4 · Signature Color" subtitle="Bacta is the healing fluid you submerge in to recover — and it glows cyan. The app's name made literal. Cyan applied to FINAL; section channels retuned to a clinical palette that clears the cyan band.">
        <DCArtboard id="colorstudy" label="Signature color studies (★ Bacta Cyan applied)" width={880} height={560}>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%', padding: 12 }}>
            <ColorStudies />
          </div>
        </DCArtboard>
        <DCArtboard id="palette" label="System palette — identity · connection · section channels" width={520} height={520}>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%', padding: 12 }}>
            <SystemPalette />
          </div>
        </DCArtboard>
        <DCArtboard id="context" label="MX-4 contextual color — one identity, dressed for the room" width={760} height={460}>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%', padding: 12 }}>
            <ContextStudy />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
