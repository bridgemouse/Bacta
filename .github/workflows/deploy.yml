name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to LXC 108
    runs-on: [self-hosted, bacta]

    steps:
      - name: Pull latest code
        run: |
          cd /opt/bacta
          git pull origin main

      - name: Install dependencies
        run: |
          cd /opt/bacta
          npm ci

      - name: Build
        run: |
          cd /opt/bacta
          npm run build

      - name: Restart service
        run: sudo systemctl restart bacta-api

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:3001/health | jq .
